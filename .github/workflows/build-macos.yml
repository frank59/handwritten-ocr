name: Build macOS App

on:
  push:
    tags:
      - 'mac-v*'  # macOS 打包触发标签，如 mac-v1.0.0
  workflow_dispatch:  # 手动触发

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paddlepaddle==3.0.0
          pip install paddleocr==2.10.0
          pip install opencv-python-headless==4.10.0.84
          pip install PySide6==6.8.3
          pip install pandas openpyxl "numpy>=1.24,<2.0"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller mac.spec --clean --noconfirm 2>&1

      - name: List dist directory (debug)
        run: |
          echo "=== dist directory contents ==="
          ls -la dist/
          echo "=== handwritten-ocr.app contents ==="
          ls -la "dist/handwritten-ocr.app/Contents/MacOS/" 2>/dev/null || echo "No MacOS directory"
          echo "=== Check if app bundle exists ==="
          if [ -d "dist/handwritten-ocr.app" ]; then
            echo "App bundle found!"
          else
            echo "App bundle NOT found!"
            exit 1
          fi

      - name: Copy Qt plugins (required for PySide6)
        run: |
          # Copy Qt platform plugins
          QT_PLUGIN_PATH=$(python -c "import PySide6; from pathlib import Path; p = Path(PySide6.__file__).parent; print(p / 'plugins')")
          echo "Qt plugins path: $QT_PLUGIN_PATH"
          mkdir -p "dist/handwritten-ocr.app/Contents/PlugIns"
          cp -r "$QT_PLUGIN_PATH"/platforms "dist/handwritten-ocr.app/Contents/PlugIns/" 2>/dev/null || true
          cp -r "$QT_PLUGIN_PATH"/imageformats "dist/handwritten-ocr.app/Contents/PlugIns/" 2>/dev/null || true
          cp -r "$QT_PLUGIN_PATH"/iconengines "dist/handwritten-ocr.app/Contents/PlugIns/" 2>/dev/null || true
          cp -r "$QT_PLUGIN_PATH"/styles "dist/handwritten-ocr.app/Contents/PlugIns/" 2>/dev/null || true
          echo "=== PlugIns copied ==="
          ls -la "dist/handwritten-ocr.app/Contents/PlugIns/"

      - name: Create distribution archive
        run: |
          cd dist
          # 创建 zip 压缩包
          zip -r handwritten-ocr-macos.zip handwritten-ocr.app
          echo "=== archive created ==="
          ls -la handwritten-ocr-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: handwritten-ocr-macos.zip
          path: dist/handwritten-ocr-macos.zip
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/handwritten-ocr-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}