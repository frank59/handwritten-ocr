name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'  # 发布时触发，如 v1.0.0
  workflow_dispatch:  # 手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paddlepaddle==3.0.0
          pip install paddleocr==2.10.0
          pip install opencv-python-headless==4.10.0.84
          pip install PySide6==6.8.3
          pip install pandas openpyxl "numpy>=1.24,<2.0"
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec --clean --noconfirm 2>&1
      
      - name: List dist directory (debug)
        run: |
          echo "=== dist directory contents ==="
          dir dist
          echo "=== handwritten-ocr directory contents ==="
          dir dist\handwritten-ocr
          echo "=== Check if exe exists ==="
          if exist dist\handwritten-ocr\handwritten-ocr.exe (
            echo "EXE found!"
          ) else (
            echo "EXE NOT FOUND!"
            exit 1
          )
      
      - name: Copy paddle libs
        run: |
          mkdir dist\handwritten-ocr\_internal\paddle\libs
          xcopy ${{ env.pythonLocation }}\Lib\site-packages\paddle\libs\*.dll dist\handwritten-ocr\_internal\paddle\libs\ /Y /I
          echo "=== paddle libs copied ==="
          dir dist\handwritten-ocr\_internal\paddle\libs
      
      - name: Create distribution archive
        run: |
          cd dist
          7z a -tzip handwritten-ocr-windows.zip handwritten-ocr
          echo "=== archive created ==="
          dir handwritten-ocr-windows.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: handwritten-ocr-windows.zip
          path: dist/handwritten-ocr-windows.zip
          retention-days: 30
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/handwritten-ocr-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}