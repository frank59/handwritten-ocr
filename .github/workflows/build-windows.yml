name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'  # 发布时触发，如 v1.0.0
  workflow_dispatch:  # 手动触发

permissions:
  contents: write  # 需要 write 权限才能创建 Release

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools==59.8.0 packaging
          pip install paddlepaddle==3.0.0
          pip install paddleocr==2.10.0
          pip install opencv-python-headless==4.10.0.84
          pip install PySide6==6.8.3
          pip install pandas openpyxl "numpy>=1.24,<2.0"

      - name: Build PyInstaller from source (custom bootloader)
        run: |
          pip install --no-binary pyinstaller pyinstaller==6.11.1
          echo === Verify PyInstaller installation ===
          pyinstaller --version

      - name: Download PaddleOCR models
        run: |
          set MODELS_DIR=%CD%\models
          mkdir %MODELS_DIR%
          echo === Downloading PP-OCRv4 detection model ===
          curl -L -o "%MODELS_DIR%\ch_PP-OCRv4_det_infer.tar" "https://paddleocr.bj.bcebos.com/PP-OCRv4/chinese/ch_PP-OCRv4_det_infer.tar"
          echo === Downloading PP-OCRv4 recognition model ===
          curl -L -o "%MODELS_DIR%\ch_PP-OCRv4_rec_infer.tar" "https://paddleocr.bj.bcebos.com/PP-OCRv4/chinese/ch_PP-OCRv4_rec_infer.tar"
          echo === Downloading angle classification model ===
          curl -L -o "%MODELS_DIR%\ch_ppocr_mobile_v2.0_cls_infer.tar" "https://paddleocr.bj.bcebos.com/dygraph_v2.0/ch/ch_ppocr_mobile_v2.0_cls_infer.tar"
          echo === All models downloaded ===
          dir %MODELS_DIR%

      - name: Extract models
        run: |
          set MODELS_DIR=%CD%\models
          echo === Extract detection model ===
          tar -xf "%MODELS_DIR%\ch_PP-OCRv4_det_infer.tar" -C "%MODELS_DIR%"
          echo === Extract recognition model ===
          tar -xf "%MODELS_DIR%\ch_PP-OCRv4_rec_infer.tar" -C "%MODELS_DIR%"
          echo === Extract classification model ===
          tar -xf "%MODELS_DIR%\ch_ppocr_mobile_v2.0_cls_infer.tar" -C "%MODELS_DIR%"
          echo === Extract complete ===
          dir %MODELS_DIR%

      - name: Copy text dictionary
        run: |
          mkdir %CD%\models\dict
          copy "%pythonLocation%\Lib\site-packages\ppocr\utils\ppocr_keys_v1.txt" "%CD%\models\dict\"
          echo === Dictionary copied ===
          dir %CD%\models\dict\

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec --clean --noconfirm

      - name: Verify build output
        run: |
          echo === dist directory contents ===
          dir dist
          echo === handwritten-ocr directory contents ===
          dir dist\handwritten-ocr
          echo === Check if exe exists ===
          if exist dist\handwritten-ocr\handwritten-ocr.exe (
            echo EXE found!
          ) else (
            echo EXE NOT FOUND!
            exit /b 1
          )

      - name: Copy paddle libs
        run: |
          if not exist dist\handwritten-ocr\_internal\paddle\libs (
            mkdir dist\handwritten-ocr\_internal\paddle\libs
          )
          xcopy "%pythonLocation%\Lib\site-packages\paddle\libs\*.dll" "dist\handwritten-ocr\_internal\paddle\libs\" /Y /I
          echo === paddle libs copied ===
          dir dist\handwritten-ocr\_internal\paddle\libs

      - name: Create distribution archive
        run: |
          cd dist
          7z a -tzip handwritten-ocr-windows.zip handwritten-ocr
          echo === archive created ===
          dir handwritten-ocr-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: handwritten-ocr-windows
          path: dist/handwritten-ocr-windows.zip
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/handwritten-ocr-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
