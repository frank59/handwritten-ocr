name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'  # 发布时触发，如 v1.0.0
  workflow_dispatch:  # 手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools packaging
          pip install paddlepaddle==3.0.0
          pip install paddleocr==2.10.0
          pip install opencv-python-headless==4.10.0.84
          pip install PySide6==6.8.3
          pip install pandas openpyxl "numpy>=1.24,<2.0"

      - name: Build PyInstaller from source (custom bootloader)
        run: |
          pip install --no-binary pyinstaller pyinstaller==6.11.1
          echo === Verify PyInstaller installation ===
          pyinstaller --version

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec --clean --noconfirm

      - name: Verify build output
        run: |
          echo === dist directory contents ===
          dir dist
          echo === handwritten-ocr directory contents ===
          dir dist\handwritten-ocr
          echo === Check if exe exists ===
          if exist dist\handwritten-ocr\handwritten-ocr.exe (
            echo EXE found!
          ) else (
            echo EXE NOT FOUND!
            exit /b 1
          )

      - name: Copy paddle libs
        run: |
          if not exist dist\handwritten-ocr\_internal\paddle\libs (
            mkdir dist\handwritten-ocr\_internal\paddle\libs
          )
          xcopy "%pythonLocation%\Lib\site-packages\paddle\libs\*.dll" "dist\handwritten-ocr\_internal\paddle\libs\" /Y /I
          echo === paddle libs copied ===
          dir dist\handwritten-ocr\_internal\paddle\libs

      - name: Copy setuptools (excluded from analysis, needed at runtime by paddle)
        run: |
          xcopy "%pythonLocation%\Lib\site-packages\setuptools" "dist\handwritten-ocr\_internal\setuptools\" /Y /I /E /Q
          if exist "%pythonLocation%\Lib\site-packages\pkg_resources" (
            xcopy "%pythonLocation%\Lib\site-packages\pkg_resources" "dist\handwritten-ocr\_internal\pkg_resources\" /Y /I /E /Q
          ) else (
            echo pkg_resources is bundled inside setuptools, skipping separate copy
          )
          echo === setuptools copied ===
          dir dist\handwritten-ocr\_internal\setuptools\__init__.py

      - name: Create distribution archive
        run: |
          cd dist
          7z a -tzip handwritten-ocr-windows.zip handwritten-ocr
          echo === archive created ===
          dir handwritten-ocr-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: handwritten-ocr-windows
          path: dist/handwritten-ocr-windows.zip
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/handwritten-ocr-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
